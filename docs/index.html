<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vigilancia Swing</title>
<meta name="theme-color" content="#0C120F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#0C120F; --ink:#E6EDE7; --muted:#8FA396;
    --surface:#151E18; --line:#243029;
    --accent:#D9A441; --accent-soft:#2A2413;
    --ok:#57B98B; --ok-soft:#12281D;
    --warn:#E08A63; --warn-soft:#2E1B12;
    --chip:#1D2721;
    --spark:#57B98B; --spark-fill:rgba(87,185,139,.14);
  }
  @media (prefers-color-scheme: light){
    :root{
      --bg:#EDF1EC; --ink:#1B2620; --muted:#5D6F63;
      --surface:#F8FAF7; --line:#D3DCD2;
      --accent:#B07D18; --accent-soft:#F3E8CC;
      --ok:#2E7D5B; --ok-soft:#DCEDE3;
      --warn:#B3552F; --warn-soft:#F5E3D9;
      --chip:#E4EAE2;
      --spark:#2E7D5B; --spark-fill:rgba(46,125,91,.12);
    }
  }
  *{box-sizing:border-box; margin:0}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    display:flex; justify-content:center;
  }
  .mono{font-family:ui-monospace,"Cascadia Code","SF Mono",Consolas,monospace}
  #app{
    width:min(480px,100%); min-height:100%;
    display:flex; flex-direction:column;
    padding:calc(14px + env(safe-area-inset-top)) 16px 0;
  }
  main{flex:1; display:flex; flex-direction:column; gap:16px;
    padding-bottom:calc(84px + env(safe-area-inset-bottom))}

  .appbar{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px}
  .brand{font-size:19px; font-weight:750; letter-spacing:-.01em}
  .brand span{color:var(--accent)}
  .fecha{font-size:12px; color:var(--muted)}

  .c0{display:flex; align-items:center; gap:10px; border-radius:12px; padding:11px 14px;
    background:var(--ok-soft); border:1px solid var(--ok)}
  .c0.roto{background:var(--warn-soft); border-color:var(--warn)}
  .c0 .dot{width:9px;height:9px;border-radius:50%;background:var(--ok);flex:none}
  .c0.roto .dot{background:var(--warn)}
  .c0 b{font-size:13.5px; color:var(--ok)}
  .c0.roto b{color:var(--warn)}
  .c0 small{margin-left:auto; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right}

  .kpis{display:flex; gap:8px}
  .kpi{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:12px;
    padding:9px 6px 7px; text-align:center}
  .kpi b{font-size:20px; font-weight:750; font-variant-numeric:tabular-nums; display:block}
  .kpi span{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    font-family:ui-monospace,Consolas,monospace}
  .kpi.g b{color:var(--ok)} .kpi.z b{color:var(--accent)} .kpi.e b{color:var(--warn)}
  .kpi.n b{color:var(--ink)} .kpi.neg b{color:var(--warn)} .kpi.pos b{color:var(--ok)}

  h2{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted);
    font-family:ui-monospace,Consolas,monospace; font-weight:600;
    display:flex; align-items:center; gap:8px; margin-top:2px}
  h2::after{content:""; flex:1; height:1px; background:var(--line)}

  .card{background:var(--surface); border:1px solid var(--line); border-radius:14px;
    padding:13px 14px 11px; display:flex; flex-direction:column; gap:9px;
    border-left:3px solid var(--ok)}
  .top{display:flex; align-items:baseline; gap:8px; flex-wrap:wrap}
  .tk{font-size:17px; font-weight:750}
  .nombre{font-size:12.5px; color:var(--muted); flex:1; min-width:0;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .px{font-size:15px; font-weight:650; font-variant-numeric:tabular-nums}
  .mid{display:flex; gap:12px; align-items:center}
  .stats{display:grid; grid-template-columns:1fr 1fr; gap:2px 14px; flex:1; min-width:0}
  .stats div{display:flex; justify-content:space-between; gap:6px; font-size:12px}
  .stats dt{color:var(--muted)} .stats dd{font-variant-numeric:tabular-nums; font-weight:600}
  .plan{display:flex; justify-content:space-between; gap:8px; border-top:1px dashed var(--line);
    padding-top:8px; font-size:11.5px; font-variant-numeric:tabular-nums;
    font-family:ui-monospace,Consolas,monospace}
  .plan .s{color:var(--warn)} .plan .o{color:var(--ok)} .plan .a{color:var(--muted)}

  .zona{background:var(--surface); border:1px solid var(--line); border-radius:14px; overflow:hidden}
  .row{display:flex; align-items:center; gap:9px; padding:10px 14px;
    border-bottom:1px solid var(--line); font-size:13px}
  .row:last-child{border-bottom:none}
  .row .tk{font-size:14px; min-width:50px}
  .row .nombre{max-width:34%}
  .row .datos{margin-left:auto; display:flex; gap:11px; font-variant-numeric:tabular-nums;
    color:var(--muted); font-size:12px; white-space:nowrap}
  .row .datos b{color:var(--ink); font-weight:600}

  .badge-e{font-size:10px; font-weight:700; letter-spacing:.05em; color:var(--warn);
    background:var(--warn-soft); border:1px solid var(--warn); border-radius:99px; padding:2px 8px;
    font-family:ui-monospace,Consolas,monospace; white-space:nowrap}
  .chipe{font-size:10px; font-weight:700; letter-spacing:.06em; border-radius:99px; padding:2px 9px;
    font-family:ui-monospace,Consolas,monospace; text-transform:uppercase}
  .chipe.cerrada-pos{color:var(--ok); background:var(--ok-soft); border:1px solid var(--ok)}
  .chipe.cerrada-neg{color:var(--warn); background:var(--warn-soft); border:1px solid var(--warn)}
  .chipe.abierta{color:var(--accent); background:var(--accent-soft); border:1px solid var(--accent)}
  .chipe.pendiente{color:var(--muted); background:var(--chip); border:1px solid var(--line)}

  .vacio{color:var(--muted); font-size:13px; padding:4px 2px}
  .nota{font-size:11.5px; color:var(--muted); line-height:1.55;
    border-top:1px solid var(--line); padding-top:10px}
  .aviso-backfill{font-size:11px; color:var(--muted); background:var(--chip);
    border-radius:8px; padding:6px 10px}

  .fechasel{display:flex; gap:8px; overflow-x:auto; padding-bottom:4px; scrollbar-width:none}
  .fechasel::-webkit-scrollbar{display:none}
  .fbtn{flex:none; background:var(--surface); border:1px solid var(--line); border-radius:12px;
    color:var(--ink); padding:8px 12px; text-align:center; font-size:12px; cursor:pointer;
    font-family:inherit}
  .fbtn small{display:block; font-size:10.5px; color:var(--muted); font-variant-numeric:tabular-nums}
  .fbtn.act{border-color:var(--accent); background:var(--accent-soft)}

  table{width:100%; border-collapse:collapse; font-size:12.5px}
  th{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
    font-family:ui-monospace,Consolas,monospace; text-align:left; font-weight:600;
    padding:8px 8px 6px; border-bottom:1px solid var(--line)}
  td{padding:9px 8px; border-bottom:1px solid var(--line); vertical-align:middle}
  tr:last-child td{border-bottom:none}
  td.num{font-variant-numeric:tabular-nums; text-align:right; font-weight:600}
  td.num.pos{color:var(--ok)} td.num.neg{color:var(--warn)}
  .tsub{display:block; font-size:11px; color:var(--muted); font-weight:400}
  .tabla-wrap{background:var(--surface); border:1px solid var(--line); border-radius:14px;
    overflow-x:auto}

  nav{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:min(480px,100%); display:flex;
    background:var(--surface); border-top:1px solid var(--line);
    padding:8px 6px calc(9px + env(safe-area-inset-bottom))}
  .tab{flex:1; text-align:center; font-size:10px; letter-spacing:.08em; text-transform:uppercase;
    color:var(--muted); font-family:ui-monospace,Consolas,monospace; line-height:1.7;
    background:none; border:none; cursor:pointer; padding:2px 0}
  .tab svg{display:block; width:20px; height:20px; margin:0 auto; stroke:currentColor; fill:none; stroke-width:1.8}
  .tab.act{color:var(--accent); font-weight:700}
  .cargando{color:var(--muted); text-align:center; padding:40px 0; font-size:13px}
</style>
</head>
<body>
<div id="app">
  <div class="appbar">
    <div class="brand">Vigilancia<span>·Swing</span></div>
    <div class="fecha" id="cab-fecha"></div>
  </div>
  <main id="main"><div class="cargando">Cargando el feed…</div></main>
  <nav>
    <button class="tab act" id="tab-hoy">
      <svg viewBox="0 0 24 24"><path d="M3 12l9-8 9 8M6 10v9h12v-9"/></svg>Hoy</button>
    <button class="tab" id="tab-hist">
      <svg viewBox="0 0 24 24"><path d="M12 8v4l3 3M12 21a9 9 0 1 1 0-18 9 9 0 0 1 0 18z"/></svg>Historial</button>
    <button class="tab" id="tab-rend">
      <svg viewBox="0 0 24 24"><path d="M4 19V5M4 19h16M8 15l3-4 3 2 5-7"/></svg>Rendimiento</button>
  </nav>
</div>

<script>
"use strict";
const $ = (s) => document.querySelector(s);
const main = $("#main");
const bust = () => "?v=" + Date.now();
const MESES = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const DIAS = ["dom","lun","mar","mié","jue","vie","sáb"];

let cache = { latest:null, index:null, rend:null, feeds:{} };

function fechaCorta(iso){
  const d = new Date(iso + "T12:00:00");
  return `${DIAS[d.getDay()]} ${d.getDate()} ${MESES[d.getMonth()]}`;
}
async function getJSON(ruta){
  const r = await fetch(ruta + bust());
  if(!r.ok) throw new Error(`No pude leer ${ruta} (${r.status})`);
  return r.json();
}
async function feedDe(fecha){
  if(!cache.feeds[fecha]) cache.feeds[fecha] = await getJSON(`feed/${fecha}.json`);
  return cache.feeds[fecha];
}

function esc(x){ const d=document.createElement("div"); d.textContent=String(x); return d.innerHTML; }

function sparkline(serie){
  if(!serie || serie.length < 5) return "";
  const w=96, h=30, min=Math.min(...serie), max=Math.max(...serie), rango=(max-min)||1;
  const pts = serie.map((v,i)=>{
    const x=(2 + i*(w-4)/(serie.length-1)).toFixed(1);
    const y=(h-4 - (v-min)/rango*(h-8)).toFixed(1);
    return `${x},${y}`;
  });
  const fin = pts[pts.length-1].split(",");
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true" style="flex:none">
    <polygon points="2,${h} ${pts.join(" ")} ${w-2},${h}" fill="var(--spark-fill)"/>
    <polyline points="${pts.join(" ")}" stroke="var(--spark)" stroke-width="1.7" fill="none"/>
    <circle cx="${fin[0]}" cy="${fin[1]}" r="2.3" fill="var(--spark)"/></svg>`;
}

function htmlC0(c0){
  const cls = c0.ok ? "" : " roto";
  const txt = c0.ok ? "C0 OK — se puede operar" : "C0 ROTO — protocolo: no abrir posiciones";
  return `<div class="c0${cls}"><span class="dot"></span><b>${txt}</b>
    <small>VIX ${c0.vix} · S&amp;P ${c0.spx_dist>0?"+":""}${c0.spx_dist}% s/SMA50</small></div>`;
}

function htmlCandidato(c, gatillo){
  const earn = c.earnings ? `<span class="badge-e">earnings ${fechaCorta(c.earnings)}</span>` : "";
  if(gatillo){
    return `<div class="card">
      <div class="top"><span class="tk">${esc(c.ticker)}</span>
        <span class="nombre">${esc(c.nombre)}</span>${earn}
        <span class="px">${c.cierre.toLocaleString("es-ES",{minimumFractionDigits:2})}&nbsp;$</span></div>
      <div class="mid">${sparkline(c.serie)}
        <dl class="stats">
          <div><dt>s/SMA-50</dt><dd>${c.dist_sma>0?"+":""}${c.dist_sma}%</dd></div>
          <div><dt>ATR</dt><dd>${c.atr_pct}%</dd></div>
          <div><dt>Respiro</dt><dd>−${c.caida}% (${c.dias_max}d)</dd></div>
          <div><dt>≈300 €</dt><dd>${c.acciones_300eur} acc.</dd></div>
        </dl></div>
      <div class="plan"><span class="s">Stop −2% → ${c.stop}</span>
        <span class="o">Obj +4% → ${c.objetivo}</span><span class="a">R/R 1:2</span></div>
    </div>`;
  }
  return `<div class="row"><span class="tk">${esc(c.ticker)}</span>
    <span class="nombre">${esc(c.nombre)}</span>${earn}
    <span class="datos"><span>SMA <b>${c.dist_sma>0?"+":""}${c.dist_sma}%</b></span>
    <span>ATR <b>${c.atr_pct}%</b></span></span></div>`;
}

function htmlFeed(f){
  const nEarn = [...f.gatillo, ...f.en_zona].filter(c=>c.earnings).length;
  const back = f.backfill ? `<div class="aviso-backfill">Feed reconstruido a posteriori
    (histórico inicial): sin consulta de earnings ese día.</div>` : "";
  return `
    ${htmlC0(f.c0)}
    <div class="kpis">
      <div class="kpi g"><b>${f.gatillo.length}</b><span>gatillo</span></div>
      <div class="kpi z"><b>${f.en_zona.length}</b><span>en zona</span></div>
      <div class="kpi e"><b>${nEarn}</b><span>earnings</span></div>
    </div>
    ${back}
    <h2>Gatillo · confirmar en TradingView</h2>
    ${f.gatillo.length ? f.gatillo.map(c=>htmlCandidato(c,true)).join("") : `<div class="vacio">Ninguno. «No operar es una decisión válida.»</div>`}
    <h2>En zona · falta C3, vigilar</h2>
    ${f.en_zona.length ? `<div class="zona">${f.en_zona.map(c=>htmlCandidato(c,false)).join("")}</div>` : `<div class="vacio">Ninguno.</div>`}
    <p class="nota">Máx. 2–3 posiciones en sectores distintos · C4: verifica los earnings a mano ·
    Herramienta de análisis, no recomendación: la decisión es siempre tuya.</p>`;
}

/* ---------------- vistas ---------------- */
async function verHoy(){
  activa("hoy");
  main.innerHTML = `<div class="cargando">Cargando el feed…</div>`;
  try{
    cache.latest = cache.latest || await getJSON("latest.json");
    $("#cab-fecha").textContent = "cierre " + fechaCorta(cache.latest.fecha_datos);
    main.innerHTML = htmlFeed(cache.latest);
  }catch(e){ main.innerHTML = `<div class="vacio">Error cargando el feed: ${esc(e.message)}</div>`; }
}

async function verHistorial(fechaSel){
  activa("hist");
  main.innerHTML = `<div class="cargando">Cargando historial…</div>`;
  try{
    cache.index = cache.index || await getJSON("feed/index.json");
    const fechas = cache.index.filter(f => /^\d{4}-\d{2}-\d{2}$/.test(f)).reverse();
    const sel = fechaSel || fechas[0];
    const feed = await feedDe(sel);
    const botones = fechas.map(fe=>{
      const f = cache.feeds[fe];
      const sub = f ? `${f.gatillo.length}G · ${f.en_zona.length}Z` : "&nbsp;";
      return `<button class="fbtn${fe===sel?" act":""}" data-f="${fe}">${fechaCorta(fe)}<small>${sub}</small></button>`;
    }).join("");
    main.innerHTML = `<div class="fechasel">${botones}</div>` + htmlFeed(feed);
    main.querySelectorAll(".fbtn").forEach(b=>
      b.addEventListener("click", ()=>verHistorial(b.dataset.f)));
  }catch(e){ main.innerHTML = `<div class="vacio">Error: ${esc(e.message)}</div>`; }
}

function chipEstado(s){
  if(s.estado==="cerrada")
    return `<span class="chipe cerrada-${s.ret_pct>0?"pos":"neg"}">${s.motivo}</span>`;
  return `<span class="chipe ${s.estado}">${s.estado}</span>`;
}

async function verRendimiento(){
  activa("rend");
  main.innerHTML = `<div class="cargando">Cargando auditoría…</div>`;
  try{
    cache.rend = cache.rend || await getJSON("rendimiento.json");
    const r = cache.rend, s = r.resumen;
    const tiles = s ? `<div class="kpis">
        <div class="kpi n"><b>${s.n}</b><span>cerradas</span></div>
        <div class="kpi n"><b>${s.win_rate}%</b><span>win rate</span></div>
        <div class="kpi ${s.esperanza_R>=0?"pos":"neg"}"><b>${s.esperanza_R>0?"+":""}${s.esperanza_R.toFixed(2)}</b><span>E[R]</span></div>
        <div class="kpi ${s.suma_R>=0?"pos":"neg"}"><b>${s.suma_R>0?"+":""}${s.suma_R.toFixed(1)}</b><span>R total</span></div>
      </div>`
      : `<div class="vacio">Aún no hay señales cerradas: la auditoría se irá rellenando sola cada noche.</div>`;
    const filas = r.senales.map(x=>{
      const res = x.estado==="pendiente" ? "—"
        : `${x.ret_pct>0?"+":""}${x.ret_pct}%<span class="tsub">${x.r>0?"+":""}${x.r} R</span>`;
      return `<tr>
        <td>${fechaCorta(x.fecha_senal)}</td>
        <td><b>${esc(x.ticker)}</b><span class="tsub">${esc(x.nombre)}</span></td>
        <td>${chipEstado(x)}</td>
        <td class="num ${x.ret_pct>0?"pos":(x.ret_pct<0?"neg":"")}">${res}</td>
      </tr>`;
    }).join("");
    main.innerHTML = `
      <h2>La esperanza real del feed, en vivo</h2>
      ${tiles}
      <p class="nota" style="border-top:none;padding-top:0">Cada señal GATILLO se simula
      mecánicamente con el protocolo de referencia: entrada en la apertura del día siguiente,
      stop −${r.params.stop_pct}%, objetivo +${r.params.objetivo_pct}%, cierre al
      ${r.params.limite_dias}º día. Criterio conservador (si un día toca stop y objetivo,
      cuenta el stop). Mide el FEED mecánico, no tus operaciones reales con confirmación visual.</p>
      <h2>Señal a señal</h2>
      <div class="tabla-wrap"><table>
        <thead><tr><th>Señal</th><th>Valor</th><th>Estado</th><th style="text-align:right">Resultado</th></tr></thead>
        <tbody>${filas}</tbody>
      </table></div>
      <p class="nota">Actualizado: ${esc(r.actualizado.replace("T"," "))}. Con pocas señales
      los números NO son fiables todavía; la significancia llega con decenas de operaciones.</p>`;
  }catch(e){ main.innerHTML = `<div class="vacio">Error: ${esc(e.message)}</div>`; }
}

function activa(id){
  ["hoy","hist","rend"].forEach(t=>$("#tab-"+t).classList.toggle("act", t===id));
}
$("#tab-hoy").addEventListener("click", verHoy);
$("#tab-hist").addEventListener("click", ()=>verHistorial());
$("#tab-rend").addEventListener("click", verRendimiento);
verHoy();
</script>
</body>
</html>
